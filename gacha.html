<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>好運蛋扭扭樂</title>

  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/pages/gacha.css" />
</head>
<body>
  <main class="page-wrap gacha-page">
    <section class="section">
      <div class="panel gacha-topbar">
        <div class="gacha-stat">
          <span class="gacha-stat-label">🪙 好運幣</span>
          <strong id="coinCount">0</strong>
        </div>
        <div class="gacha-stat">
          <span class="gacha-stat-label">💎 點數</span>
          <strong id="pointCount">0</strong>
        </div>
        <div class="gacha-stat">
          <span class="gacha-stat-label">🎟 兌換券</span>
          <strong id="ticketCount">0</strong>
        </div>
        <div class="gacha-stat">
          <span class="gacha-stat-label">📘 收藏</span>
          <strong id="collectionCount">0 / 0</strong>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="hero-card gacha-hero">
        <span class="hero-kicker gacha-kicker">今日好運機台</span>
        <h1 class="gacha-title">好運蛋扭扭樂</h1>
        <p class="gacha-desc">抽一顆今天的好運蛋，看看會遇見哪一隻吉祥物。</p>
      </div>
    </section>

    <section class="section section-lg">
      <div class="panel gacha-machine-panel">
        <div class="gacha-machine" id="gachaMachine">
          <div class="gacha-machine-head">
            <div class="gacha-machine-glass">
              <div class="gacha-capsule-field" id="capsuleField">
                <span class="gacha-capsule capsule-a"></span>
                <span class="gacha-capsule capsule-b"></span>
                <span class="gacha-capsule capsule-c"></span>
                <span class="gacha-capsule capsule-d"></span>
                <span class="gacha-capsule capsule-e"></span>
                <span class="gacha-capsule capsule-f"></span>
              </div>
            </div>
          </div>

          <div class="gacha-machine-body">
            <div class="gacha-machine-brand">好運蛋出貨中</div>

            <div class="gacha-machine-slot">
              <div class="gacha-drop-zone" id="dropZone">
                <div class="gacha-drop-placeholder">等待好運蛋掉出來</div>
              </div>
            </div>

            <div class="gacha-machine-handle-wrap">
              <button class="gacha-handle-btn" id="drawBtn" type="button">
                轉一次
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="panel gacha-controls">
        <div class="button-row gacha-action-row">
          <button class="btn btn-start" id="drawBtnAlt" type="button">轉一次</button>
          <a class="btn btn-secondary" href="./mascot-collection.html">收藏圖鑑</a>
          <a class="btn btn-gift" href="./gift.html">前往兌換</a>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="panel gacha-result-panel">
        <h2 class="gacha-section-title">本次結果</h2>
        <div class="gacha-result" id="gachaResult">
          <div class="gacha-result-empty">
            轉動扭蛋機，看看今天的好運蛋會開出什麼吉祥物。
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="panel gacha-recent-panel">
        <div class="gacha-panel-head">
          <h2 class="gacha-section-title">最近抽到</h2>
          <a class="gacha-text-link" href="./mascot-collection.html">查看完整收藏 →</a>
</div>
        <div class="gacha-recent-list" id="recentDrawList">
          <div class="gacha-empty-inline">目前還沒有抽卡紀錄。</div>
        </div>
      </div>
    </section>
   <section class="adbox section-card">
  <h3>✨ 好運補給站</h3>
  <div class="ad-slot">
    看完今日獎勵影片，帶走 <strong>+20 好運幣</strong> 與 <strong>+1 次免費機會</strong>。<br>
    想再試一次時，先來這裡補點資源吧。
  </div>
  <div class="ad-remaining">
    今日剩餘補給：<span id="adRemaining">3</span> / 3
  </div>
  <div class="board-actions">
    <button id="watchAdBtn" class="btn btn-coin">觀看獎勵影片</button>
  </div>
</section>

  </main>

 <!--
  廣告播放 Modal 區塊
  用途：
  1. 點擊「觀看獎勵影片」後開啟此視窗
  2. 播放 ad.mp4 獎勵影片
  3. 影片播放完成後，啟用「領取獎勵」按鈕
  4. 使用者點擊領獎後，由 gacha.js 執行 coin / 免費次數補給邏輯
-->

  
<div id="adVideoModal" class="ad-video-modal">
  <div class="ad-video-box">
    <button id="adVideoCloseBtn" class="ad-video-close" type="button">×</button>

     <div class="ad-modal-head">
        <h3 id="adModalTitle" class="ad-modal-title" data-ad-modal-title>
          🎬 今日補給影片
        </h3>
        <p class="ad-modal-desc" data-ad-modal-desc>
          看完影片可獲得 +20 好運幣、+1 次免費機會
        </p>
      </div>
    
    <video
      id="adVideoPlayer"
      playsinline
      webkit-playsinline
      preload="auto"
      controls
    >
     <source src="./video/ad-v2.mp4" type="video/mp4" />
      你的瀏覽器不支援影片播放。
    </video>

    <div id="adVideoStatus" class="ad-video-status">
      影片尚未播放完成
    </div>
  </div>
</div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js?v=20260705"></script>
  <script src="./js/api.js?v=20260705"></script>
  <script src="./js/user.js?v=20260705"></script>

 
  <script src="./js/data/gacha-data.js?v=20260705"></script>
  <script src="./js/storage/gacha-storage.js?v=20260705"></script>
  <script src="./js/ui/gacha-ui.js?v=20260705"></script>
  <script src="./js/ui/topbar.js?v=20260705"></script>
  
  <script src="./js/config/ad-config.js?v=20260705"></script>
  <script src="./js/storage/ad-storage.js?v=20260705"></script>
  <script src="./js/ui/ad-modal.js"></script>
  <script src="./js/game/ad-reward.js?v=20260705"></script>
  
  
  <script src="./js/game/gacha-engine.js?v=20260705"></script>
  <script src="./js/pages/gacha.js?v=20260705"></script>
  

</body>
</html>
