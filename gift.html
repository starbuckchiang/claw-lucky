<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>舊社選物｜好運商品兌換</title>

  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/gift.css?v=2" />
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1 class="primary-title">🎁 好運商品兌換頁</h1>
      <p class="page-text">
        這裡可以用你在抽幸運物累積的 <strong>點數</strong> 與 <strong>兌換券</strong> 兌換商品。<br>
        如果還差一點點，就回去抽幾次再來看看吧。
      </p>

      <div class="top-actions">
        <a class="btn btn-gift" href="./index.html">回 抽吉祥物</a>
      </div>
    </div>

    <div class="wallet">
      <h2>💼 我的兌換資產</h2>
      <div class="wallet-stats">
        <div class="wallet-stat">
          <div class="wallet-label">💎 目前點數</div>
          <div class="wallet-value" id="points">0</div>
        </div>

        <div class="wallet-stat">
          <div class="wallet-label">🎟 目前兌換券</div>
          <div class="wallet-value" id="tickets">0</div>
        </div>
      </div>
    </div>

    <div class="grid" id="giftGrid"></div>

    <div class="tips-card">
      <h3>✨ 小提醒</h3>
      <p>如果你現在還差一點資源，可以先回抽吉祥物首頁補一下：</p>

      <ul class="tips-list">
        <li>每日登入可領 +50 金幣</li>
        <li>補給站每天最多可領 3 次獎勵</li>
        <li>每成功夾到 5 次會送 1 張兌換券</li>
        <li>每成功夾到 10 次還會送 1 個 Bonus 禮物</li>
      </ul>

      <div class="top-actions">
        <a class="btn btn-gift" href="./index.html">回 抽吉祥物</a>
      </div>
    </div>

    <div class="history-card">
      <h3>🧾 已兌換紀錄</h3>
      

      <div id="historyList" class="history-list"></div>
      <div id="historyEmpty" class="history-empty" style="display:none;">
        目前還沒有兌換紀錄。
      </div>
    </div>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/gift-storage.js?v=2"></script>
  <script src="./js/gift.js?v=2"></script>
</body>
</html>
