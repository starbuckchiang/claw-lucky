<body>
  <main class="page-shell">

        <div class="slide">

      <button class="slider-arrow next" type="button" aria-label="下一張">›</button>

      <div class="slider-dots">
        <button class="dot is-active" type="button" aria-label="第 1 張"></button>
        <button class="dot" type="button" aria-label="第 2 張"></button>
        <button class="dot" type="button" aria-label="第 3 張"></button>
