<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>首頁</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="topbar">
      <a class="logo" href="./index.html">
        <span class="logo-mark">福</span>
        <span class="logo-text">Lucky Buddies</span>
      </a>

      <form class="searchbar" action="#" method="get">
        <span class="search-icon">⌕</span>
        <input type="search" placeholder="搜尋吉祥物 / 願望 / 活動" aria-label="搜尋" />
        <button type="submit">搜尋</button>
      </form>
    </section>

    <section class="entry-grid">
      <a class="entry-card" href="./index07.html">
        <span class="entry-label">抽吉祥物</span>
      </a>

      <a class="entry-card" href="./wanted.html">
        <span class="entry-label">許願池</span>
      </a>

      <a class="entry-card" href="./wanted-form.html">
        <span class="entry-label">送出願望</span>
      </a>

      <a class="entry-card" href="./gift.html">
        <span class="entry-label">好運兌換</span>
      </a>

      <a class="entry-card" href="./qa.html">
        <span class="entry-label">FAQ</span>
      </a>
    </section>

    <section class="hero-slider" aria-label="主視覺輪播">
      <div class="slider-track">
        <div class="slide is-active">
          <img src="images/image_center.jpg" alt="主視覺 1" />
        </div>
        <div class="slide">
          <img src="images/image1.jpg" alt="主視覺 2" />
        </div>
        <div class="slide">
          <img src="images/mascot.jpg" alt="主視覺 3" />
        </div>
      </div>

      <button class="slider-arrow prev" type="button" aria-label="上一張">‹</button>
      <button class="slider-arrow next" type="button" aria-label="下一張">›</button>

      <div class="slider-dots">
        <button class="dot is-active" type="button" aria-label="第 1 張"></button>
        <button class="dot" type="button" aria-label="第 2 張"></button>
        <button class="dot" type="button" aria-label="第 3 張"></button>
      </div>

      <div class="hero-caption-bar">
        <span>本週主打吉祥物</span>
      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
