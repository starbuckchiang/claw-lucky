<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>首頁版型</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="banner">
    <div class="banner-item">
      <div class="thumb"><img src="images/image1.jpg" alt="圖片1"></div>
      <div class="title">圖片1</div>
    </div>
    <div class="banner-item">
      <div class="thumb"><img src="images/home.jpg" alt="首頁"></div>
      <div class="title">首頁</div>
    </div>
    <div class="banner-item">
      <div class="thumb"><img src="images/mascot.jpg" alt="抽吉祥物"></div>
      <div class="title">抽吉祥物</div>
    </div>
    <div class="banner-item">
      <div class="thumb"><img src="images/redeem.jpg" alt="好運兌換"></div>
      <div class="title">好運兌換</div>
    </div>
    <div class="banner-item">
      <div class="thumb"><img src="images/wish.jpg" alt="許願池"></div>
      <div class="title">許願池</div>
    </div>
  </section>

  <section class="hero-image">
    <img src="images/image_center.jpg" alt="主視覺" />
  </section>

  <script src="main.js"></script>
</body>
</html>
